name: PR Checks

on:
  pull_request:

jobs:
  php-lint:
    name: PHP syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Lint all PHP files
        run: |
          status=0
          while IFS= read -r -d '' file; do
            php -l "$file" > /dev/null || status=1
          done < <(find . -path ./.git -prune -o -name '*.php' -print0)
          exit $status
